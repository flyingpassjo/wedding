<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Wedding API</title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        background: #f6f7fb;
        color: #1f2937;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
      }
      .box {
        max-width: 760px;
        margin: 0 auto;
        background: #fff;
        border: 1px solid #e3e8f0;
        border-radius: 16px;
        padding: 20px;
      }
      h1 {
        margin: 0;
        font-size: 22px;
      }
      p {
        margin: 8px 0 0;
        line-height: 1.6;
      }
      ul {
        margin: 16px 0 0;
        padding-left: 20px;
      }
      code {
        background: #f2f5fa;
        border-radius: 6px;
        padding: 2px 6px;
      }
    </style>
  </head>
  <body>
    <section class="box">
      <h1>Wedding API 실행 중</h1>
      <p>이 URL은 Google Apps Script Web App입니다.</p>
      <ul>
        <li><code>?action=health</code> 상태 확인</li>
        <li><code>?action=rsvp_list</code> RSVP 목록</li>
        <li><code>?action=photo_list</code> 사진 업로드 목록</li>
        <li><code>?action=visit_stats</code> 방문 통계</li>
      </ul>
      <p>RSVP/사진 업로드 저장은 <code>POST</code>로 처리됩니다.</p>
    </section>
  </body>
 </html>
