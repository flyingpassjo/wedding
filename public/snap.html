<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>스냅 | 카카오 오픈채팅 공유</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
    <style>
      :root {
        --bg: #efefef;
        --text: #1f1f1f;
        --muted: #7a7a7a;
        --line: #d8d8d8;
        --panel: #f8f8f8;
        --primary: #f4df2f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
      }

      .wrap {
        max-width: 480px;
        margin: 0 auto;
        padding: 20px 16px 28px;
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        text-decoration: none;
        color: #1c1c1c;
        font-size: 17px;
        font-weight: 600;
        margin-bottom: 14px;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 16px;
        overflow: hidden;
        background: #fff;
        box-shadow: 0 8px 18px rgba(30, 30, 30, 0.08);
      }

      .cover {
        position: relative;
        height: 220px;
      }

      .cover img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .cover-dim {
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(0, 0, 0, 0.1), rgba(0, 0, 0, 0.55));
      }

      .cover-text {
        position: absolute;
        left: 14px;
        right: 14px;
        bottom: 12px;
        color: #fff;
      }

      .cover-text p {
        margin: 0;
      }

      .cover-kicker {
        font-size: 13px;
        letter-spacing: 0.12em;
      }

      .cover-title {
        margin-top: 6px;
        font-size: 24px;
        font-weight: 700;
        line-height: 1.35;
      }

      .content {
        padding: 16px;
      }

      .content p {
        margin: 0;
        font-size: 16px;
        line-height: 1.65;
      }

      .content p + p {
        margin-top: 8px;
      }

      .status {
        margin-top: 12px;
        color: var(--muted);
        font-size: 14px;
      }

      .actions {
        margin-top: 14px;
        display: grid;
        gap: 8px;
      }

      .btn {
        min-height: 52px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: #fff;
        color: var(--text);
        text-decoration: none;
        font-size: 17px;
        font-weight: 700;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }

      .btn-primary {
        background: var(--primary);
        border-color: transparent;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <a class="back-link" href="./">‹ 청첩장 보기</a>

      <section class="card">
        <div class="cover">
          <img src="images/wedding-main.jpg" alt="스냅 안내 이미지" />
          <div class="cover-dim"></div>
          <div class="cover-text">
            <p class="cover-kicker">CAPTURE OUR MOMENTS</p>
            <p class="cover-title">카카오 오픈채팅방으로<br />사진·영상을 보내주세요</p>
          </div>
        </div>

        <div class="content">
          <p>사진과 동영상을 원본 화질에 가깝게 보내실 수 있도록 오픈채팅으로 받습니다.</p>
          <p>이 페이지는 잠시 후 자동으로 오픈채팅방으로 이동합니다.</p>
          <p id="status" class="status">오픈채팅방으로 이동 중...</p>

          <div class="actions">
            <a id="open-btn" class="btn btn-primary" href="#" target="_blank" rel="noreferrer">오픈채팅방 바로 열기</a>
            <button id="copy-btn" class="btn" type="button">오픈채팅 링크 복사</button>
          </div>
        </div>
      </section>
    </main>

    <script>
      const OPEN_CHAT_URL = 'https://open.kakao.com/o/s4kn2uki'
      const statusEl = document.getElementById('status')
      const openBtn = document.getElementById('open-btn')
      const copyBtn = document.getElementById('copy-btn')
      const noAuto = new URLSearchParams(window.location.search).get('noauto') === '1'

      openBtn.href = OPEN_CHAT_URL

      copyBtn.addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(OPEN_CHAT_URL)
          statusEl.textContent = '링크를 복사했습니다.'
        } catch (e) {
          statusEl.textContent = '복사에 실패했습니다. 버튼을 눌러 바로 입장해 주세요.'
        }
      })

      if (!noAuto) {
        setTimeout(() => {
          window.location.replace(OPEN_CHAT_URL)
        }, 700)
      } else {
        statusEl.textContent = '자동 이동이 꺼져 있습니다. 버튼으로 입장해 주세요.'
      }
    </script>
  </body>
</html>
